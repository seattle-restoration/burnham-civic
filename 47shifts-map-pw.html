<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family: Georgia, 'Times New Roman', serif; background:#0c0e1a; color:#e5e5e5; overflow:hidden; }
#tabs {
  position:fixed; top:0; left:0; right:0; z-index:1000;
  background:rgba(12,14,26,0.97); border-bottom:1px solid rgba(251,191,36,0.3);
  display:flex; align-items:center; padding:0 16px; height:42px;
}
#tabs .brand {
  font-size:13px; letter-spacing:2px; color:#fbbf24; font-weight:700;
  margin-right:24px;
}
#tabs button {
  background:transparent; border:none; color:#888;
  font-family:inherit; font-size:12px; letter-spacing:1px; text-transform:uppercase;
  padding:10px 18px; cursor:pointer; border-bottom:2px solid transparent;
  transition:color 0.15s, border-color 0.15s;
}
#tabs button:hover { color:#e5e5e5; }
#tabs button.active { color:#fbbf24; border-bottom-color:#fbbf24; }
#tabs .spacer { flex:1; }
#tabs a.home { color:#888; font-size:11px; letter-spacing:1px; text-decoration:none; }
#tabs a.home:hover { color:#fbbf24; }
.frame-wrap { position:fixed; top:42px; left:0; right:0; bottom:0; }
.frame-wrap iframe { width:100%; height:100%; border:0; display:block; }
.frame-wrap.hidden { display:none; }

#paywall-gate {
  position:fixed; top:0; left:0; right:0; bottom:0; z-index:9999;
  background:#111; display:flex; align-items:center; justify-content:center; flex-direction:column;
}
#paywall-gate h1 { font-size:22px; letter-spacing:2px; color:#fbbf24; margin-bottom:8px; }
#paywall-gate h2 { font-family:Georgia,serif; font-size:18px; color:#e5e5e5; margin-bottom:16px; font-weight:400; }
#paywall-gate p.lead { font-size:14px; color:#888; margin-bottom:20px; }
#pw-input {
  font-family:Georgia,serif; font-size:14px; padding:8px 12px;
  border:1px solid #555; background:#1a1a1a; color:#e5e5e5;
  width:240px; display:block; margin:0 0 12px; text-align:center;
}
#pw-submit {
  font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:#111; background:#fbbf24; border:none; padding:10px 28px; cursor:pointer;
  font-family:Georgia,serif;
}
#pw-error { font-family:Georgia,serif; font-size:12px; color:#ef4444; margin:12px 0 0; display:none; }
</style>
</head>
<body>

<div id="paywall-gate">
  <h1>47 SHIFTS</h1>
  <h2>Operations</h2>
  <p class="lead">Restricted access.</p>
  <input type="password" id="pw-input" placeholder="Password">
  <button id="pw-submit">Enter</button>
  <p id="pw-error">Incorrect password.</p>
</div>

<div id="app" style="display:none;">
  <div id="tabs">
    <span class="brand">47 SHIFTS</span>
    <button class="tab-btn active" data-tab="map">Live Map</button>
    <span class="spacer"></span>
    <a href="/" class="home">&larr; burnhamcivic.org</a>
  </div>
  <div class="frame-wrap" data-pane="map">
    <iframe id="frame-map" src="about:blank" title="Live Map"></iframe>
  </div>
</div>

<script>
(function(){
  var PASS='saveseattle';
  var COOKIE='tbc_pw_auth';
  var DAYS=30;
  function getCookie(n){var m=document.cookie.match(new RegExp('(^| )'+n+'=([^;]+)'));return m?m[2]:null;}
  function setCookie(n,v,d){var x=new Date();x.setTime(x.getTime()+d*86400000);document.cookie=n+'='+v+';expires='+x.toUTCString()+';path=/';}

  var mapLoaded=false;
  function loadMap(){ if(!mapLoaded){ document.getElementById('frame-map').src='/_pw/map.html'; mapLoaded=true; } }

  function showApp(){
    document.getElementById('paywall-gate').style.display='none';
    document.getElementById('app').style.display='block';
    loadMap();
  }

  function activate(name){
    var btns=document.querySelectorAll('.tab-btn');
    for(var i=0;i<btns.length;i++){ btns[i].classList.toggle('active', btns[i].dataset.tab===name); }
    var panes=document.querySelectorAll('.frame-wrap');
    for(var j=0;j<panes.length;j++){ panes[j].classList.toggle('hidden', panes[j].dataset.pane!==name); }
    if(name==='map') loadMap();
  }

  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.addEventListener('click', function(){ activate(b.dataset.tab); });
  });

  if(getCookie(COOKIE)===btoa(PASS)){ showApp(); return; }

  function tryPw(){
    var inp=document.getElementById('pw-input');
    if(inp.value===PASS){ setCookie(COOKIE,btoa(PASS),DAYS); showApp(); }
    else { document.getElementById('pw-error').style.display='block'; inp.value=''; inp.focus(); }
  }
  document.getElementById('pw-submit').addEventListener('click',tryPw);
  document.getElementById('pw-input').addEventListener('keydown',function(e){if(e.key==='Enter')tryPw();});
  setTimeout(function(){document.getElementById('pw-input').focus();},100);
})();
</script>

</body>
