<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 240" preserveAspectRatio="xMidYMid meet" fill="currentColor">
  <!-- Mooring mast (originally for dirigibles) -->
  <line x1="30" y1="0"  x2="30" y2="22" stroke="currentColor" stroke-width="1.4"/>
  <rect x="28" y="22" width="4"  height="6"/>
  <line x1="30" y1="28" x2="30" y2="36" stroke="currentColor" stroke-width="1.4"/>
  <rect x="26" y="36" width="8"  height="4"/>
  <!-- Stepped setbacks descending: narrowest top, widening to base -->
  <rect x="22" y="40"  width="16" height="22"/>
  <rect x="18" y="62"  width="24" height="22"/>
  <rect x="14" y="84"  width="32" height="22"/>
  <rect x="8"  y="106" width="44" height="28"/>
  <rect x="0"  y="134" width="60" height="106"/>
</svg>
