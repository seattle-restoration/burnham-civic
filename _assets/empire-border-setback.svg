<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 200" preserveAspectRatio="xMidYMid meet" fill="currentColor">
  <!-- Empire State stepped setback profile, top-to-bottom: narrow at top widening at base, then a tile repeat -->
  <!-- Tile 1 -->
  <rect x="17" y="0"   width="6"  height="14"/>
  <rect x="14" y="14"  width="12" height="16"/>
  <rect x="10" y="30"  width="20" height="20"/>
  <rect x="6"  y="50"  width="28" height="22"/>
  <rect x="0"  y="72"  width="40" height="28"/>
  <!-- Tile 2 (mirror flow downward) -->
  <rect x="17" y="100" width="6"  height="14"/>
  <rect x="14" y="114" width="12" height="16"/>
  <rect x="10" y="130" width="20" height="20"/>
  <rect x="6"  y="150" width="28" height="22"/>
  <rect x="0"  y="172" width="40" height="28"/>
</svg>
