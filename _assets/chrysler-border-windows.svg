<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 26 180" preserveAspectRatio="xMidYMid meet" fill="none" stroke="currentColor" stroke-width="1">
  <!-- Vertical column of triangular sunburst windows, 6 repeats of 30 units -->
  <line x1="13" y1="0" x2="13" y2="180"/>
  <g>
    <!-- 5 triangular wedges fanning from a center bottom -->
    <polygon points="13,8 8,28 18,28" fill="currentColor"/>
    <polygon points="13,8 4,24 5,28 21,28 22,24" fill="currentColor"/>
  </g>
  <g transform="translate(0,30)">
    <polygon points="13,8 8,28 18,28" fill="currentColor"/>
    <polygon points="13,8 4,24 5,28 21,28 22,24" fill="currentColor"/>
  </g>
  <g transform="translate(0,60)">
    <polygon points="13,8 8,28 18,28" fill="currentColor"/>
    <polygon points="13,8 4,24 5,28 21,28 22,24" fill="currentColor"/>
  </g>
  <g transform="translate(0,90)">
    <polygon points="13,8 8,28 18,28" fill="currentColor"/>
    <polygon points="13,8 4,24 5,28 21,28 22,24" fill="currentColor"/>
  </g>
  <g transform="translate(0,120)">
    <polygon points="13,8 8,28 18,28" fill="currentColor"/>
    <polygon points="13,8 4,24 5,28 21,28 22,24" fill="currentColor"/>
  </g>
  <g transform="translate(0,150)">
    <polygon points="13,8 8,28 18,28" fill="currentColor"/>
    <polygon points="13,8 4,24 5,28 21,28 22,24" fill="currentColor"/>
  </g>
</svg>
