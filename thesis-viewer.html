<title>DRUCC Thesis Viewer</title>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --border: #2a2a2a;
  --text: #e0e0e0;
  --dim: #888;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --blue: #3b82f6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); font-size: 13px; }
.header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 16px; font-weight: 700; letter-spacing: 2px; }
.header .stats { font-size: 12px; color: var(--dim); }
.header .stats span { color: var(--text); font-weight: 700; }
.filters { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn { padding: 4px 12px; border: 1px solid var(--border); background: transparent; color: var(--dim); font-size: 11px; font-family: inherit; cursor: pointer; border-radius: 4px; }
.filter-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(59,130,246,0.1); }
.filter-btn:hover { border-color: var(--text); color: var(--text); }
.sort-bar { padding: 8px 24px; border-bottom: 1px solid var(--border); display: flex; gap: 16px; font-size: 11px; color: var(--dim); }
.sort-bar span { cursor: pointer; }
.sort-bar span:hover { color: var(--text); }
.sort-bar span.active { color: var(--blue); }
.thesis-list { padding: 0 24px; }
.thesis { border-bottom: 1px solid var(--border); padding: 16px 0; cursor: pointer; }
.thesis:hover { background: rgba(255,255,255,0.02); }
.thesis-row { display: flex; align-items: center; gap: 16px; }
.conviction-badge { width: 48px; height: 48px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; }
.conv-high { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.conv-mid { background: rgba(234,179,8,0.15); color: var(--yellow); border: 1px solid rgba(234,179,8,0.3); }
.conv-low { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.thesis-main { flex: 1; min-width: 0; }
.thesis-ticker { font-size: 16px; font-weight: 700; }
.thesis-company { font-size: 11px; color: var(--dim); margin-left: 8px; }
.thesis-signal { font-size: 11px; color: var(--blue); margin-left: 8px; }
.thesis-meta { font-size: 11px; color: var(--dim); margin-top: 4px; }
.thesis-meta span { margin-right: 16px; }
.thesis-direction { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 3px; }
.dir-short { background: rgba(239,68,68,0.15); color: var(--red); }
.dir-long { background: rgba(34,197,94,0.15); color: var(--green); }
.thesis-detail { display: none; padding: 16px 0 16px 64px; }
.thesis.expanded .thesis-detail { display: block; }
.detail-section { margin-bottom: 16px; }
.detail-section h3 { font-size: 12px; font-weight: 700; color: var(--blue); margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
.detail-section p { font-size: 12px; line-height: 1.6; color: var(--text); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.detail-stat { background: var(--surface); padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border); }
.detail-stat label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
.detail-stat value { font-size: 14px; font-weight: 700; display: block; margin-top: 2px; }
.override-bar { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
.override-bar input { width: 60px; padding: 4px 8px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 13px; border-radius: 4px; text-align: center; }
.override-bar button { padding: 4px 12px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 11px; font-family: inherit; cursor: pointer; border-radius: 4px; }
.override-bar button.approve { border-color: var(--green); color: var(--green); }
.override-bar button.approve:hover { background: rgba(34,197,94,0.15); }
.override-bar button.reject { border-color: var(--red); color: var(--red); }
.override-bar button.reject:hover { background: rgba(239,68,68,0.15); }
.override-bar button.kill { border-color: var(--yellow); color: var(--yellow); }
.override-bar button.kill:hover { background: rgba(234,179,8,0.15); }
.a2-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.a2-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim); }
.a2-pill.warn { border-color: var(--yellow); color: var(--yellow); }
.a2-pill.good { border-color: var(--green); color: var(--green); }
.drop-indicator { padding: 0 24px 24px; text-align: center; color: var(--dim); font-size: 12px; margin-top: 24px; border: 2px dashed var(--border); margin: 24px; padding: 24px; border-radius: 8px; }
</style>
</head>
<body><div id="gate" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.97);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;">
<div style="text-align:center;font-family:monospace;color:#888;">

function parseJSONL(text) {
  return text.trim().split('\n').filter(l => l.trim()).map(l => {
    try { return JSON.parse(l); } catch { return null; }
  }).filter(Boolean);
}

function loadPasted() {
  const text = document.getElementById('paste-area').value;
  if (text.trim()) {
    THESES = parseJSONL(text);
    render();
    document.getElementById('drop-zone').style.display = 'none';
  }
}

// Drag and drop
document.getElementById('drop-zone').addEventListener('dragover', e => { e.preventDefault(); e.currentTarget.style.borderColor = 'var(--blue)'; });
document.getElementById('drop-zone').addEventListener('dragleave', e => { e.currentTarget.style.borderColor = 'var(--border)'; });
document.getElementById('drop-zone').addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => {
      THESES = parseJSONL(ev.target.result);
      render();
      document.getElementById('drop-zone').style.display = 'none';
    };
    reader.readAsText(file);
  }
});

function convClass(c) { return c >= 60 ? 'conv-high' : c >= 30 ? 'conv-mid' : 'conv-low'; }

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-bar span').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function toggleThesis(idx) {
  document.getElementById('thesis-' + idx).classList.toggle('expanded');
}

function filtered() {
  let list = [...THESES];
  if (currentFilter === 'high') list = list.filter(t => t.conviction >= 60);
  else if (currentFilter === 'mid') list = list.filter(t => t.conviction >= 30 && t.conviction < 60);
  else if (currentFilter === 'low') list = list.filter(t => t.conviction < 30);
  else if (currentFilter === 'edgar') list = list.filter(t => (t.thesis?.a1 || '').includes('EDGAR'));
  else if (currentFilter === 'dilution') list = list.filter(t => (t.thesis?.a1 || '').includes('424B5'));
  else if (currentFilter === 'insider') list = list.filter(t => (t.thesis?.a1 || '').includes('INSIDER'));

  if (currentSort === 'conviction') list.sort((a, b) => b.conviction - a.conviction);
  else if (currentSort === 'date') list.sort((a, b) => new Date(b.scoredAt || 0) - new Date(a.scoredAt || 0));
  else if (currentSort === 'ticker') list.sort((a, b) => (a.ticker || '').localeCompare(b.ticker || ''));
  else if (currentSort === 'mcap') list.sort((a, b) => (b.thesis?.market?.marketCapM || 0) - (a.thesis?.market?.marketCapM || 0));
  else if (currentSort === 'move') {
    list.sort((a, b) => {
      const am = parseFloat((a.thesis?.a2?.moveSinceFiling || '0').replace('%', ''));
      const bm = parseFloat((b.thesis?.a2?.moveSinceFiling || '0').replace('%', ''));
      return am - bm;
    });
  }
  return list;
}

function render() {
  const list = filtered();
  const el = document.getElementById('thesis-list');

  document.getElementById('total-count').textContent = THESES.length;
  document.getElementById('avg-conv').textContent = THESES.length ? Math.round(THESES.reduce((s, t) => s + (t.conviction || 0), 0) / THESES.length) : 0;
  document.getElementById('high-count').textContent = THESES.filter(t => t.conviction >= 80).length;

  el.innerHTML = list.map((t, i) => {
    const th = t.thesis || {};
    const mkt = th.market || {};
    const a2 = th.a2 || {};
    const sig = th.signal || {};
    const move = a2.moveSinceFiling || 'N/A';
    const moveNum = parseFloat(move);
    const moveColor = moveNum < -5 ? 'var(--green)' : moveNum > 5 ? 'var(--red)' : 'var(--dim)';

    return `
    <div class="thesis" id="thesis-${i}" onclick="toggleThesis(${i})">
      <div class="thesis-row">
        <div class="conviction-badge ${convClass(t.conviction)}">${t.conviction}</div>
        <div class="thesis-main">
          <div>
            <span class="thesis-ticker">${t.ticker || '?'}</span>
            <span class="thesis-company">${th.company || ''}</span>
            <span class="thesis-signal">${th.a1 || ''}</span>
            <span class="thesis-direction ${(t.direction||'').includes('SHORT') ? 'dir-short' : 'dir-long'}">${t.direction || '?'}</span>
          </div>
          <div class="thesis-meta">
            <span>MCap: $${mkt.marketCapM || '?'}M</span>
            <span>IV: ${mkt.iv30 ? mkt.iv30.toFixed(0) + '%' : 'N/A'}</span>
            <span>Price: $${mkt.price || '?'}</span>
            <span style="color:${moveColor}">Move: ${move}</span>
            <span>News: ${a2.newsArticles || '?'}</span>
            <span>${sig.type || ''} ${sig.form || ''}</span>
          </div>
        </div>
      </div>
      <div class="thesis-detail">
        <div class="detail-grid">
          <div class="detail-section">
            <h3>Sonnet Reasoning</h3>
            <p>${t.reasoning || 'N/A'}</p>
          </div>
          <div class="detail-section">
            <h3>Sonnet Critique</h3>
            <p>${t.critique || 'N/A'}</p>
          </div>
        </div>
        <div class="detail-section">
          <h3>Kill Condition</h3>
          <p>${t.kill_condition || 'N/A'}</p>
        </div>
        <div class="detail-section">
          <h3>A2 Gaps</h3>
          <div class="a2-pills">
            ${(t.a2_needed || []).map(g => `<span class="a2-pill warn">${g}</span>`).join('')}
          </div>
        </div>
        <div class="detail-section">
          <h3>A2 Summary</h3>
          <div class="a2-pills">
            ${(a2.a2Summary || th.a2Summary || []).map(s => {
              const isGood = s.includes('Liquid') || s.includes('available');
              const isWarn = s.includes('priced in') || s.includes('Already');
              return `<span class="a2-pill ${isGood ? 'good' : isWarn ? 'warn' : ''}">${s}</span>`;
            }).join('')}
          </div>
        </div>
        <div class="detail-grid" style="margin-top:12px;">
          <div class="detail-stat"><label>Volume</label><value>${mkt.volume?.toLocaleString() || 'N/A'}</value></div>
          <div class="detail-stat"><label>Options</label><value>${mkt.hasOptions ? 'Yes' : 'No'}</value></div>
          <div class="detail-stat"><label>Put Count</label><value>${a2.putCount || 'N/A'}</value></div>
          <div class="detail-stat"><label>Filing Date</label><value>${sig.fileDate || 'N/A'}</value></div>
        </div>
        <div class="override-bar">
          <span style="font-size:11px;color:var(--dim);">Your conviction:</span>
          <input type="number" min="0" max="100" value="${t.conviction}" id="override-${i}">
          <button class="approve" onclick="event.stopPropagation();overrideThesis(${i},'approved')">APPROVE</button>
          <button class="reject" onclick="event.stopPropagation();overrideThesis(${i},'rejected')">REJECT</button>
          <button class="kill" onclick="event.stopPropagation();overrideThesis(${i},'killed')">KILL</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function overrideThesis(idx, action) {
  const list = filtered();
  const t = list[idx];
  const newConv = parseInt(document.getElementById('override-' + idx).value) || t.conviction;
  t.userConviction = newConv;
  t.userAction = action;
  t.userActionAt = new Date().toISOString();

  const el = document.getElementById('thesis-' + idx);
  const badge = el.querySelector('.conviction-badge');
  badge.textContent = newConv;
  badge.className = 'conviction-badge ' + convClass(newConv);

  if (action === 'rejected' || action === 'killed') {
    el.style.opacity = '0.3';
  } else if (action === 'approved') {
    el.style.borderLeft = '3px solid var(--green)';
  }
}

// Auto-load if file:// protocol (local)
if (EMBEDDED_DATA.length) {
  THESES = EMBEDDED_DATA;
  render();
  document.getElementById('drop-zone').style.display = 'none';
}
</script>
